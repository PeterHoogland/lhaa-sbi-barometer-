name: SBI Test Alert (tijdelijk - na test verwijderen)

# Eenmalige handmatige test van de alarm-mail (SMTP). Stuurt een testbericht naar
# ALERT_TO (default peter@hoogland.be) via dezelfde alert.py als de echte alarmering.
# Wordt na de test verwijderd. Alleen handmatig te starten (workflow_dispatch).
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Stuur testmail via alert.py
        working-directory: app/pipeline
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          python -m pipeline.alert \
            --subject "SBI test-alarm (handmatige test)" \
            --body "Dit is een testbericht van De Nationale Stress Index. Ontvang je dit, dan werkt de alarm-mail (SMTP) correct en word je voortaan gewaarschuwd bij een storing die zichzelf niet herstelt. Geen actie nodig."
