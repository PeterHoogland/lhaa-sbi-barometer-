name: SBI Daily Update

on:
  schedule:
    # FALLBACK (op :30). De BETROUWBARE uurlijkse trigger is nu de Cloudflare
    # Cron-Worker `lhaa-sbi-cron` (app/cron-worker), die workflow_dispatch exact op
    # tijd aanroept, ook als niemands computer aanstaat. GitHub's eigen scheduled-cron
    # is best-effort; hij blijft hier enkel als dead-man's-switch: vuurt hij toch, dan
    # vangt hij een eventuele Worker-uitval op. De tijd-guard laat alleen 06-20u BE
    # écht door (elk heel uur van 06:00 t/m 20:00). Peter 2026-06-04.
    - cron: "3,33 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fetch-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Time-guard (alleen door tussen 06-20u BE-tijd of bij handmatige trigger)
        id: timecheck
        run: |
          BE_HOUR=$(TZ='Europe/Brussels' date +%H)
          H=$((10#$BE_HOUR))
          echo "Belgian local hour: $BE_HOUR"
          if [ "${{ github.event_name }}" = "schedule" ] && { [ "$H" -lt 6 ] || [ "$H" -gt 20 ]; }; then
            echo "Skip — schedule firing maar BE-uur $BE_HOUR valt buiten 06-20."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Proceed."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.timecheck.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        if: steps.timecheck.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: app/pipeline/requirements.txt

      - name: Set up Node 22 LTS
        if: steps.timecheck.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python deps
        if: steps.timecheck.outputs.skip != 'true'
        working-directory: app/pipeline
        run: pip install -r requirements.txt

      - name: Fetch real data (Python pipeline)
        if: steps.timecheck.outputs.skip != 'true'
        working-directory: app/pipeline
        env:
          # De Lijn Kern Open Data subscription-key (gratis). Niet-gezet → de
          # De Lijn-fetcher valt op mock. Zet via `gh secret set DELIJN_API_KEY`.
          DELIJN_API_KEY: ${{ secrets.DELIJN_API_KEY }}
        run: python -m pipeline.run
        continue-on-error: true

      - name: Install engine deps
        if: steps.timecheck.outputs.skip != 'true'
        working-directory: app/engine
        run: npm install

      - name: Generate daily output (hybrid real + synthetic)
        if: steps.timecheck.outputs.skip != 'true'
        working-directory: app/engine
        env:
          # Campagne-webhook (trigger-uitgang). Niet-gezet → dry-run (logt de
          # payload, verstuurt niets). Zet via `gh secret set CAMPAIGN_WEBHOOK_URL`.
          CAMPAIGN_WEBHOOK_URL: ${{ secrets.CAMPAIGN_WEBHOOK_URL }}
          CAMPAIGN_WEBHOOK_TOKEN: ${{ secrets.CAMPAIGN_WEBHOOK_TOKEN }}
        run: npm run generate-fixture

      - name: Bron-gezondheid — dagelijkse canary (connectie + verwerking + voeding)
        if: steps.timecheck.outputs.skip != 'true'
        id: health
        working-directory: app/pipeline
        # Leest de dagrun (raw-values.json) + de index (latest-expert.json) en
        # controleert: levert elke bron verse ECHTE data (geen mock/cache-terugval),
        # draaide de fetch vandaag, en is de index effectief gevoed (composiet +
        # percentiel + 25 indicatoren)? Schrijft health-report.json naar app/data EN
        # web/public/data (deployt mee → /data/health-report.json) en zet output
        # `verdict`. Breekt de build NOOIT (continue-on-error); een aparte stap
        # markeert de run rood bij `critical`.
        run: python -m pipeline.healthcheck
        continue-on-error: true

      - name: Install web deps
        if: steps.timecheck.outputs.skip != 'true'
        working-directory: app/web
        run: npm install

      - name: Build web production bundle
        if: steps.timecheck.outputs.skip != 'true'
        working-directory: app/web
        run: npm run build

      - name: Deploy to Cloudflare (Workers static assets — primair)
        if: steps.timecheck.outputs.skip != 'true'
        working-directory: app/web
        env:
          # De Cloudflare API-token staat als repo-secret 'LESHAUTES'; we mappen 'm
          # naar de env-var die wrangler verwacht (CLOUDFLARE_API_TOKEN).
          CLOUDFLARE_API_TOKEN: ${{ secrets.LESHAUTES }}
        run: |
          # Primaire host: instant propagatie + correcte cache-headers (geen sticky
          # CDN-edge zoals Surge). Draait pas écht zodra CLOUDFLARE_API_TOKEN als
          # secret gezet is; tot dan no-op zodat de workflow niet breekt. Daarna mag
          # de Surge-stap hieronder weg (account_id staat in app/web/wrangler.jsonc).
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            npx --yes wrangler@4 deploy
          else
            echo "CLOUDFLARE_API_TOKEN niet gezet — Cloudflare-deploy overgeslagen (zet de secret om te activeren)."
          fi

      - name: Deploy to Surge.sh (tijdelijk vangnet — verwijderen na Cloudflare-cutover)
        if: steps.timecheck.outputs.skip != 'true'
        working-directory: app/web
        env:
          SURGE_LOGIN: peter@hoogland.be
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          npm install -g surge
          surge ./dist les-hautes-alpes-sbi.surge.sh

      - name: Persist cache + doorlopende historie
        if: steps.timecheck.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f app/data/sbi-cache.json app/pipeline/pending_events.json app/data/history app/data/trigger-state.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: persist daily fetch cache + historie [skip ci]"
            git pull --rebase origin main || true
            git push origin main || true
          else
            echo "No cache changes to commit"
          fi

      - name: Alarm bij gedegradeerde/kritieke bron-gezondheid (één rollende issue, niet-blokkerend)
        if: steps.timecheck.outputs.skip != 'true'
        env:
          # Zet dit secret op een Zapier/Make "Catch Hook -> e-mail naar peter@hoogland.be"
          # voor een directe mail. Niet gezet -> vangnet: één rollende GitHub-issue die
          # opent bij een probleem en sluit bij herstel (mailt je via je repo-notificaties).
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
        run: |
          REPORT=app/data/health-report.json
          if [ ! -f "$REPORT" ]; then echo "Geen health-report.json - de canary draaide niet."; exit 0; fi
          VERDICT=$(python3 -c "import json;print(json.load(open('$REPORT'))['verdict'])")
          echo "Bron-gezondheid verdict: $VERDICT"
          TITLE="SBI bron-gezondheid (automatische canary)"
          # Eén rollende issue: opzoeken of er al een open staat (dedupe -> geen spam).
          NUM=$(gh issue list --state open --json number,title \
            --jq '.[] | select(.title|test("bron-gezondheid")) | .number' 2>/dev/null | head -1)
          if [ "$VERDICT" = "ok" ]; then
            if [ -n "$NUM" ]; then
              gh issue close "$NUM" -c "Hersteld op $(date +%F): alle bronnen weer op verse echte data, index gevoed." >/dev/null 2>&1 \
                && echo "Issue #$NUM gesloten (hersteld)." || echo "Sluiten faalde (niet-blokkerend)."
            else
              echo "OK - alle bronnen verbonden, index gevoed. Niets te melden."
            fi
            exit 0
          fi
          # degraded of critical: open de rollende issue als die nog niet bestaat.
          if [ -z "$NUM" ]; then
            gh issue create --title "$TITLE" --body-file app/data/health-report.md >/dev/null 2>&1 \
              && echo "Issue aangemaakt ($VERDICT)." || echo "Issue-aanmaak faalde (niet-blokkerend)."
          else
            gh issue comment "$NUM" --body "Nog steeds **$VERDICT** op $(date +%F). Zie de step-summary van deze run." >/dev/null 2>&1 || true
            echo "Issue #$NUM staat al open ($VERDICT) - bijgewerkt, geen nieuwe (anti-spam)."
          fi
          if [ -n "$ALERT_WEBHOOK_URL" ]; then
            MSG=$(python3 -c "import json;r=json.load(open('$REPORT'));print(r['verdict'].upper()+': '+'; '.join(r['messages'][-2:]))")
            PAYLOAD=$(python3 -c "import json,sys;print(json.dumps({'to':'peter@hoogland.be','date':sys.argv[1],'verdict':sys.argv[2],'message':sys.argv[3]}))" "$(date +%F)" "$VERDICT" "$MSG")
            curl -fsS -X POST "$ALERT_WEBHOOK_URL" -H "Content-Type: application/json" -d "$PAYLOAD" \
              && echo "Webhook-alert verstuurd." || echo "Webhook-POST faalde (niet-blokkerend)."
          fi

      - name: Run rood markeren bij kritieke index (GitHub mailt je dan automatisch)
        if: steps.timecheck.outputs.skip != 'true' && steps.health.outputs.verdict == 'critical'
        run: |
          echo "Bron-gezondheid CRITICAL: de index zelf is niet correct gevoed."
          echo "De run wordt bewust rood gemarkeerd zodat GitHub je een mail stuurt."
          exit 1

      - name: Post-deploy live-eindresultaat-verificatie (volledig, autonoom)
        if: steps.timecheck.outputs.skip != 'true'
        working-directory: app/pipeline
        # Sluit de lus: controleert NA de deploy of de LIVE site het correcte
        # eindresultaat toont — vers (deploy gepropageerd), 25 indicatoren, composiet
        # = som van de contributies, elke indicator gescoord of eerlijk uitgesloten,
        # niets stil gesimuleerd, canary niet kritiek. Faalt dit -> exit non-zero ->
        # run rood -> GitHub mailt. Zo wordt ELKE uurlijkse run volledig op
        # correctheid van het eindresultaat gecontroleerd, autonoom.
        run: python -m pipeline.verify_live
