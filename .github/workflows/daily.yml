name: Daily SBI Update

on:
  schedule:
    # 22:00 UTC = 23:00 CET (winter) / 00:00 CEST (zomer)
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

# Voorkom dat twee runs tegelijk surge proberen te updaten
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Opt-in Node 24 runtime voor alle JS-actions (deprecation Node 20 vanaf juni 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fetch-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: app/pipeline/requirements.txt

      - name: Set up Node 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python deps
        working-directory: app/pipeline
        run: pip install -r requirements.txt

      - name: Fetch real data (Python pipeline)
        working-directory: app/pipeline
        run: python -m pipeline.run
        continue-on-error: true

      - name: Install engine deps
        working-directory: app/engine
        run: npm install

      - name: Generate daily output (hybrid real + synthetic)
        working-directory: app/engine
        run: npm run generate-fixture

      - name: Install web deps
        working-directory: app/web
        run: npm install

      - name: Build web production bundle
        working-directory: app/web
        run: npm run build

      - name: Deploy to Surge.sh
        working-directory: app/web
        env:
          SURGE_LOGIN: peter@hoogland.be
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          npm install -g surge
          surge ./dist les-hautes-alpes-sbi.surge.sh
