name: SBI Agentic Monitor

# De onafhankelijke bewaker-van-de-bewaker. Draait op een EIGEN cron (los van daily.yml
# en de Cloudflare cron-Worker), zodat zelfs als die allebei uitvallen, deze workflow
# merkt dat het dashboard niet meer ververst en de update opnieuw aftrapt. Alles in
# GitHub's cloud -> volledig computer-onafhankelijk, niemands computer hoeft aan te staan.
#
# Twee lagen (zie app/pipeline/pipeline/agentic_monitor.py):
#  - deterministisch: live-checks + hertrigger bij stilstand (geen sleutel nodig).
#  - agentisch (optioneel): een begrijpelijke gezondheidslezing door Claude, alleen als
#    het secret ANTHROPIC_API_KEY gezet is. Zonder sleutel draait alleen de harde laag.

on:
  schedule:
    # ELKE 20 MINUTEN overdag (07/27/47 op 04-19u UTC = ~06-21u BE). Dit is de strakke
    # HARTSLAG: gratis schedulers (Cloudflare-Worker én GitHub-cron) zijn best-effort en
    # slaan af en toe een uur over. Door elke 20 min te checken en bij stilstand zelf
    # daily.yml te hertriggeren (via GitHub's eigen token), herstelt een gemiste update
    # binnen ~20 min i.p.v. een vol uur. De hertrigger zelf is begrensd tot 06-20u BE
    # (zie agentic_monitor.py); buiten dat venster checkt hij wel, maar trapt hij niet af.
    - cron: "7,27,47 4-19 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write        # nodig om daily.yml opnieuw af te trappen bij stilstand
  issues: write

concurrency:
  group: monitor-${{ github.ref }}
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installeer dependencies
        run: pip install --quiet requests certifi

      - name: Agentic monitor
        working-directory: app/pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Optioneel: zet dit secret om de agentische (Claude) laag aan te zetten.
          # Zonder dit secret draait alleen de deterministische bewaking + hertrigger.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pipeline.agentic_monitor

      - name: Alarm naar peter@hoogland.be bij hard probleem (laatste lijn)
        # De monitor exit non-zero alleen bij een HARD probleem (inconsistent cijfer,
        # kritieke canary, fallback-vangrail) dat hertriggeren niet oplost — precies
        # de "niet automatisch hersteld"-categorie. Zelfde verzender als daily.yml;
        # zonder secrets blijft het vangnet de rode run (GitHub-notificatiemail).
        if: failure()
        working-directory: app/pipeline
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY="De onafhankelijke SBI-monitor ziet een HARD probleem op de live site dat
          hertriggeren niet oplost (inconsistent cijfer, kritieke canary of de
          fallback-vangrail). Dit is per definitie niet zelf-herstelbaar.

          Monitor-log met de details: $RUN_URL
          Live: https://les-hautes-alpes-sbi.brainwolves.workers.dev"
          python -m pipeline.alert --subject "SBI ALARM: hard probleem live ($(TZ='Europe/Brussels' date '+%F %H:%M') BE)" --body "$BODY" || true
